  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #f0f4f8;
      color: #333;
    }

    header {
      background: #1a2e44;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.3rem; }

    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    #controls label { font-size: 0.9rem; opacity: 0.85; }

    #year-select {
      padding: 6px 14px;
      border-radius: 4px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      background: #fff;
      color: #1a2e44;
    }

    #main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 32px;
      gap: 16px;
    }

    #year-display {
      font-size: 2.4rem;
      font-weight: bold;
      color: #1a2e44;
      letter-spacing: 2px;
    }

    #map-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 12px;
      width: 100%;
      max-width: 920px;
    }

    #map { width: 100%; height: auto; display: block; }

    #legend-container {
      width: 100%;
      max-width: 920px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 12px 20px 4px;
    }

    #legend { width: 100%; display: block; }

    #tooltip {
      position: fixed;
      background: rgba(20, 30, 50, 0.9);
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      line-height: 1.6;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 1000;
      white-space: nowrap;
    }

    .prefecture-path {
      stroke: #fff;
      stroke-width: 0.4;
      cursor: pointer;
    }

    .prefecture-path:hover {
      stroke: #333;
      stroke-width: 1.5;
      opacity: 0.85;
    }
  </style>
</head>

<header>
  <h1>🗾 日本人口ヒートマップ</h1>
  <div id="controls">

    <select id="year-select"></select>
  </div>
</header>

<div id="main">

      { "id": 36, "name": "徳島県", "population": 791111 },
      { "id": 37, "name": "香川県", "population": 906660 },
      { "id": 38, "name": "愛媛県", "population": 1414436 },
      { "id": 39, "name": "高知県", "population": 786882 },
      { "id": 40, "name": "福岡県", "population": 3964696 },
      { "id": 41, "name": "佐賀県", "population": 820300 },
      { "id": 42, "name": "長崎県", "population": 1570778 },
      { "id": 43, "name": "熊本県", "population": 1723466 },
      { "id": 44, "name": "大分県", "population": 1198516 },
      { "id": 45, "name": "宮崎県", "population": 1051025 },
      { "id": 46, "name": "鹿児島県", "population": 1729007 },
      { "id": 47, "name": "沖縄県", "population": 945111 }
    ]
  };

  // ── 定数 ──
  const GEOJSON_URL = 'https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson';
  const SVG_W = 900, SVG_H = 680;

  // ── 年リスト（降順） ──
  const years = Object.keys(populationData).sort((a, b) => +b - +a);

  // ── 年選択UIの初期化 ──
  const selectEl = document.getElementById('year-select');
  years.forEach(y => {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '年';
    selectEl.appendChild(opt);
  });
  let currentYear = years[0];
  document.getElementById('year-display').textContent = currentYear + '年';

  // ── 全年を通じた人口の最小・最大（スケールを固定して年間比較しやすくする） ──
  const allPops = Object.values(populationData).flat().map(d => d.population);
  const [minPop, maxPop] = d3.extent(allPops);

  // ── カラースケール（薄い青 → 濃い青） ──
  const colorScale = d3.scaleSequential()
    .domain([minPop, maxPop])
    .interpolator(d3.interpolateBlues);

  // ── 都道府県IDから人口エントリを引くMapを生成 ──
  function buildPopMap(year) {
    return new Map(populationData[year].map(d => [d.id, d]));
  }

  // ── SVG・投影・パスジェネレーター ──
  const svg = d3.select('#map');
  const projection = d3.geoMercator();
  const pathGen = d3.geoPath().projection(projection);

  // ── ツールチップ ──
  const tooltip = document.getElementById('tooltip');

  // ── 凡例の描画 ──
  function drawLegend() {
    const legendSvg = d3.select('#legend');
    const lW = 320, lH = 20, lX = 10, lY = 16;

    const defs = legendSvg.append('defs');
    const grad = defs.append('linearGradient').attr('id', 'pop-gradient')
      .attr('x1', '0%').attr('x2', '100%');
    d3.range(11).forEach(i => {
      grad.append('stop')
        .attr('offset', `${i * 10}%`)
        .attr('stop-color', colorScale(minPop + (maxPop - minPop) * i / 10));
    });

    legendSvg.append('text')
      .attr('x', lX).attr('y', lY - 4)
      .attr('font-size', '11px').attr('fill', '#555')
      .text('人口スケール（人）');

    legendSvg.append('rect')
      .attr('x', lX).attr('y', lY)
      .attr('width', lW).attr('height', lH)
      .attr('fill', 'url(#pop-gradient)')
      .attr('rx', 2);

    const axisScale = d3.scaleLinear().domain([minPop, maxPop]).range([lX, lX + lW]);
    legendSvg.append('g')
      .attr('transform', `translate(0,${lY + lH})`)
      .call(
        d3.axisBottom(axisScale)
          .ticks(5)
          .tickFormat(d => (d / 10000).toFixed(0) + '万')
      )
      .call(g => g.select('.domain').attr('stroke', '#aaa'))
      .call(g => g.selectAll('line').attr('stroke', '#aaa'))
      .call(g => g.selectAll('text').attr('font-size', '11px').attr('fill', '#555'));
  }

  // ── GeoJSONを取得して地図を描画 ──
  d3.json(GEOJSON_URL).then(geojson => {
    projection.fitExtent([[10, 10], [SVG_W - 10, SVG_H - 10]], geojson);

    let popMap = buildPopMap(currentYear);

    // 都道府県パスの描画
    svg.selectAll('.prefecture-path')
      .data(geojson.features)
      .enter()
      .append('path')
      .attr('class', 'prefecture-path')
      .attr('d', pathGen)
      .attr('fill', d => {
        const entry = popMap.get(+d.id);
        return entry ? colorScale(entry.population) : '#ccc';
      })
      .on('mousemove', (event, d) => {
        const entry = popMap.get(+d.id);
        if (!entry) return;
        tooltip.style.opacity = '1';
        tooltip.style.left = (event.clientX + 14) + 'px';
        tooltip.style.top = (event.clientY - 40) + 'px';
        tooltip.innerHTML =
          `<strong>${entry.name}</strong><br>` +
          `人口: ${entry.population.toLocaleString()} 人`;
      })
      .on('mouseleave', () => { tooltip.style.opacity = '0'; });

    drawLegend();

    // ── 年選択イベント ──
    selectEl.addEventListener('change', function () {
      currentYear = this.value;
      document.getElementById('year-display').textContent = currentYear + '年';
      popMap = buildPopMap(currentYear);

      svg.selectAll('.prefecture-path')
        .transition().duration(600)
        .attr('fill', d => {
          const entry = popMap.get(+d.id);
          return entry ? colorScale(entry.population) : '#ccc';
        });
    });

  }).catch(err => {
    console.error('GeoJSONの読み込みに失敗しました:', err);
    document.getElementById('map-container').innerHTML =
      '<p style="padding:20px;color:red;">⚠️ 地図データの読み込みに失敗しました。インターネット接続を確認してください。</p>';
  });
</script>

</body>
</html>
